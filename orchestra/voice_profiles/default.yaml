creator:
  name: "Hogan Lin"
  archetype: "Builder sharing what actually works, not what sounds good"

voice:
  adjectives:
    - direct
    - grounded
    - specific
    - honest
  not:
    - corporate
    - motivational-speaker
    - hustle-bro
    - preachy
    - guru-ish

signature_moves:
  - "Lead with a specific observation, not a general claim"
  - "Show the work, not just the result"
  - "End with a question or next step, not a lesson"
  - "Use 'I' and 'you', avoid 'we' or 'one'"
  - "One concrete example beats three abstract points"

content_rules:
  max_emojis: 2
  hashtag_style: "3-5 specific, never generic (#productdevelopment not #motivation)"
  cta_style: "implicit - ask a question or share a resource"
  avoid_phrases:
    - "game changer"
    - "transform your"
    - "unlock the secret"
    - "here's the thing"
    - "let that sink in"